name: Daily AI Job Agent

on:
  schedule:
    - cron: "0 3 * * *"   # Runs every day at 03:00 UTC
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Google credentials
        run: |
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json
          echo '${{ secrets.GOOGLE_CLIENT_SECRET }}' > client_secret.json

      - name: Run Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python main.py

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: outputs/