name: Daily AI Job Agent

on:
  schedule:
    - cron: "0 3 * * *"   # Runs every day at 03:00 UTC
  workflow_dispatch:       # Allows manual trigger

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies (PDF fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core 2>&1 | tail -3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements.txt -q
          playwright install chromium 2>&1 | tail -5

      # ── Cache: restore score_cache.json & generation_progress.json ──
      - name: Restore cache files
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            score_cache.json
            generation_progress.json
          key: agent-cache-${{ github.run_id }}
          restore-keys: |
            agent-cache-

      - name: Ensure cache files exist
        run: |
          if [ ! -f score_cache.json ]; then echo '[]' > score_cache.json; fi
          if [ ! -f generation_progress.json ]; then echo '{}' > generation_progress.json; fi

      # ── Restore Google OAuth credentials ────────────────────────────
      - name: Restore Google OAuth credentials
        run: |
          if [ -n "${{ secrets.GOOGLE_TOKEN_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_TOKEN_JSON_BASE64 }}" | base64 -d > token.json
            echo "✓ token.json restored"
          fi

          if [ -n "${{ secrets.GOOGLE_CLIENT_SECRET_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_CLIENT_SECRET_BASE64 }}" | base64 -d > client_secret.json
            echo "✓ client_secret.json restored"
          fi

      # ── Restore CV ───────────────────────────────────────────────────
      - name: Restore CV
        run: |
          echo "${{ secrets.CV_TEXT_BASE64 }}" | base64 -d > enhanced_cv.txt
          echo "✓ enhanced_cv.txt restored"

      - name: Verify CV contents
        run: |
          echo "Size:"
          wc -c enhanced_cv.txt

          echo "First 10 lines:"
          head -10 enhanced_cv.txt

      # ── Scrape & score job sources (parallel, stops at 50 good jobs) ─
      - name: Scrape & score job sources (parallel)
        run: python main.py --parallel --skip-generate
        continue-on-error: true

      # ── Generate CVs, Cover Letters & upload to Google Sheets ───────
      - name: Generate CVs and Cover Letters
        run: python main.py --skip-scrape --skip-score --max-jobs 50 --workers 3
        continue-on-error: true

      # ── Cache: save updated cache files ─────────────────────────────
      - name: Save cache
        uses: actions/cache@v4
        with:
          path: |
            score_cache.json
            generation_progress.json
          key: agent-cache-${{ github.run_id }}

      - name: Show generated files
        if: always()
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Project files:"
          ls -la

          echo ""
          echo "Outputs:"
          find outputs || true

      # ── Upload generated outputs as artifact ────────────────────────
      - name: Upload generated outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-files-${{ github.run_id }}
          path: outputs/**
          if-no-files-found: ignore

      # ── Upload logs and stats as artifact ───────────────────────────
      - name: Upload logs and stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.run_id }}
          path: |
            agent.log
            agent_stats.json
            processed_jobs.json
            score_cache.json
            generation_progress.json
            last_run.json
            scraper_health.json
            stats_report.html
          if-no-files-found: ignore

      # ── Commit updated cache back to repository ─────────────────────
      - name: Commit cache updates back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update cache files [skip ci]"
          file_pattern: score_cache.json generation_progress.json last_run.json
          commit_user_name: "AI Jobs Agent Bot"
          commit_user_email: "bot@ai-jobs-agent.local"
          skip_dirty_check: false
